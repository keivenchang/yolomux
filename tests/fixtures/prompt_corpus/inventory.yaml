parity_groups:
- id: visible-working-counter
  status: covered-by-both
  contract: Both clients are working/busy and must render as Working without raising needs-input or YOLO?.
  why_names_differ: The Claude capture name came from the visible `Clauding…` status counter; the Codex capture name came from the command-send scenario that produced the visible working counter. They are the same detector state, not missing counterparts.
  fixtures:
  - agent: claude
    case_name: working_visible_counter
    file: captures/working_visible_counter__claude-code-2.1.183_20260620.yaml
  - agent: claude
    case_name: working_empty_prompt_below_counter
    file: captures/working_empty_prompt_below_counter__claude-code-2.1.186_20260623.yaml
  - agent: claude
    case_name: working_labelled_composer
    file: captures/working_labelled_composer__claude-code-2.1.198_20260701.yaml
  - agent: claude
    case_name: compacting_conversation_unicode_ellipsis
    file: captures/compacting_conversation_unicode_ellipsis__claude-code-2.1.198_20260702.yaml
  - agent: claude
    case_name: compacting_conversation_progress_bar
    file: captures/compacting_conversation_progress_bar__claude-code-2.1.198_20260707.yaml
  - agent: codex
    case_name: working_command_counter
    file: captures/working_command_counter__codex-cli-0.141.0_20260620.yaml
- id: goal-active
  status: covered-by-both
  contract: Both clients can show a goal-following busy state that must render as Working without raising needs-input or YOLO?.
  why_names_differ: >-
    Both captures use the same `goal_active` case name, but the visible UI differs: Claude shows `/goal active` beside the
    `Clauding…` counter, while Codex shows `Pursuing goal` or `Goal achieved` beside the working counter.
  fixtures:
  - agent: claude
    case_name: goal_active
    file: captures/goal_active__claude-code-2.1.185_20260621.yaml
  - agent: codex
    case_name: goal_active
    file: captures/goal_active__codex-cli-0.141.0_20260621.yaml
  - agent: codex
    case_name: goal_achieved_working
    file: captures/goal_achieved_working__codex-cli-0.141.0_20260623.yaml
- id: codex-goal-achieved-idle
  status: product-specific
  contract: Codex `Goal achieved` without a visible current Working row is not busy and must not render as Working.
  why_names_differ: Codex exposes a completed-goal footer that can remain visible while the prompt is idle or contains a draft; this is not the same state as Claude `/goal active`.
  fixtures:
  - agent: codex
    case_name: goal_achieved_idle_draft
    file: captures/goal_achieved_idle_draft__codex-cli-0.141.0_20260624.yaml
- id: normal-choice-question
  status: covered-by-both
  contract: Both clients can ask non-permission user questions that should show Question.
  why_names_differ: Claude calls this AskUserQuestion and its fixtures preserve selector/accessibility variants; Codex fixtures use choice/non-permission wording from its numbered prompt layout.
  fixtures:
  - agent: claude
    case_name: ask_user_question
    file: captures/ask_user_question__claude-code-2.1.183_20260620.yaml
  - agent: claude
    case_name: ask_user_question_no_selector_accessible
    file: captures/ask_user_question_no_selector_accessible__claude-code-2.1.190_20260624.yaml
  - agent: claude
    case_name: ask_user_question_selected_option
    file: captures/ask_user_question_selected_option__claude-code-2.1.185_20260621.yaml
  - agent: claude
    case_name: parser_dependency_choice_question
    file: captures/parser_dependency_choice_question__claude-code-2.1.185_20260622.yaml
  - agent: codex
    case_name: choice_question
    file: captures/choice_question__codex-cli-0.141.0_20260620.yaml
  - agent: codex
    case_name: choice_question_real
    file: captures/choice_question_real__codex-cli-0.141.0_20260620.yaml
  - agent: codex
    case_name: question_with_answer_draft
    file: captures/question_with_answer_draft__codex-cli-0.141.0_20260620.yaml
- id: claude-interrupted-question
  status: intentionally-not-one-to-one
  contract: Claude's interrupted awaiting-user-instruction prompt should show Question; Codex interrupt/stop states in this corpus do not expose the same question prompt.
  why_names_differ: Claude renders `Interrupted · What should Claude do instead?` as an active needs-input screen. Codex Ctrl-C/stop behavior is captured separately as command/session interruption behavior, not as a matching user-question surface.
  fixtures:
  - agent: claude
    case_name: interrupted_what_should_claude_do_instead
    file: captures/interrupted_what_should_claude_do_instead__claude-code-2.1.185_20260621.yaml
- id: typed-draft
  status: covered-by-both
  contract: Both clients can have clearable composer drafts that must not be mistaken for submitted transcript text.
  why_names_differ: The Claude real capture specifically guards NBSP cursor/composer behavior, while the Codex capture is a normal typed draft.
  fixtures:
  - agent: claude
    case_name: typed_nbsp_draft
    file: captures/typed_nbsp_draft__claude-code-2.1.183_20260620.yaml
  - agent: codex
    case_name: typed_draft
    file: captures/typed_draft__codex-cli-0.141.0_20260620.yaml
- id: idle-ghost-prompt
  status: covered-by-both
  contract: Both clients can show an idle composer with ghost/suggestion text and must not trigger attention.
  why_names_differ: Claude names this ghost suggestion after the suggested text in its composer; Codex names the same detector state after the dim ghost prompt style in its TUI.
  fixtures:
  - agent: claude
    case_name: idle_ghost_suggestion
    file: captures/idle_ghost_suggestion__claude-code-2.1.183_20260620.yaml
  - agent: codex
    case_name: idle_dim_ghost_prompt
    file: captures/idle_dim_ghost_prompt__codex-cli-0.141.0_20260620.yaml
- id: idle-empty-prompt
  status: covered-by-both
  contract: Both clients can be idle at an empty composer and must not trigger attention.
  why_names_differ: This is the only exact shared real-capture case name because both products had the same simple detector scenario.
  fixtures:
  - agent: claude
    case_name: idle_empty_prompt
    file: captures/idle_empty_prompt__claude-code-2.1.183_20260620.yaml
  - agent: codex
    case_name: idle_empty_prompt
    file: captures/idle_empty_prompt__codex-cli-0.141.0_20260620.yaml
- id: product-specific-approval-prompts
  status: intentionally-not-one-to-one
  contract: Approval prompts should be captured per product feature, not forced into fake cross-product pairs.
  why_names_differ: Claude has plan, Bash, file-edit, and tool permission prompts; Codex has shell command, sandbox/network escalation, prefix-rule, and MCP approval prompts. The detector contract is shared, but the product surfaces are not equivalent enough to require a same-named capture for every case.
  fixtures:
  - agent: claude
    case_name: plan_approval_real
    file: captures/plan_approval_real__claude-code-2.1.183_20260619.yaml
  - agent: claude
    case_name: plan_approval_selected_option
    file: captures/plan_approval_selected_option__claude-code-2.1.183_20260620.yaml
  - agent: codex
    case_name: shell_approval_touch_command
    file: captures/shell_approval_touch_command__codex-cli-0.141.0_20260620.yaml
  - agent: codex
    case_name: shell_sleep_10_3_option
    file: captures/shell_sleep_10_3_option__codex-cli-0.141.0_20260620.yaml
  - agent: codex
    case_name: shell_no_selected_option
    file: captures/shell_no_selected_option__codex-cli-0.141.0_20260620.yaml
- id: product-specific-idle-negative-chrome
  status: intentionally-not-one-to-one
  contract: Product-specific idle chrome that looks question-like must stay quiet, but it should not be forced into a fake counterpart when the other client does not expose the same chrome.
  why_names_differ: Claude has a composing Tip capture that guards against treating helper chrome as a question; Codex does not have an equivalent real capture in this corpus.
  fixtures:
  - agent: claude
    case_name: composing_tip_not_question
    file: captures/composing_tip_not_question__claude-code-2.1.183_20260620.yaml
