raw_capture: |
  • Confirmed and fixed.

  Active YO Rotation is no longer used: I removed appearance.yolo_rotate_ms, yoloRotationDelay(), --yolo-rotate-delay, and --yolo-rotation-duration from runtime/source/generated assets. The old “Red reminder duration” setting is now renamed to Red/yellow/green status pulse period, and it drives the real shared --pulse-duration used by ASK? and the red/yellow/green status balls.

  Also restarted 8001 and verified served assets contain no old rotation tokens.

  Verification:

  - node --test tests/editor_preview.test.js tests/share_theme.test.js tests/tabber.test.js
  - python3 -m pytest tests/test_settings.py -q
  - focused Selenium status/settings tests
  - python3 tools/check.py passed

  No commit or push.

  Worked for 14m 10s

  › Explain this codebase

