name: wait-roster-then-send
kind: workflow
description: >-
  Watch an explicit roster until every Claude/Codex pane is stably calm: idle or done, prompt-accepting, and draft-free, then send one exact command to a separate destination through verified transport. The deterministic parser handles known wording. Flexible wording invokes this built-in model-intent contract in an isolated no-tools planner; the provider receives only the declared JSON schema and known session names. The server validates the returned plan, fixes the ten-second quiet default, and requires confirmation. Do not capture a result unless the user asks. Working, approval, input, error, disconnect, missing/non-agent panes, and drafts are not calm; revalidate before fire and never retry an ambiguous send.
tools:
  - read_activity
  - watch_all_sessions
  - preview_send_prompt
  - execute_confirmed_send
triggers:
  - periodically monitor 1 2 3 4 and if they are all done then send a command to session 1
  - wait for sessions 1 2 3 4 to be calm then send to session 1
  - when every listed agent is done send the report command to session 1
confirmation: none
default_timeout_minutes: 120
model_intent:
  handler: wait-roster-then-send
  confirmation: required
  defaults:
    quiet_seconds: 10
  candidate:
    any_of:
      - monitor
      - watch
      - keep an eye on
      - check on
      - wait for
    require_any:
      - send
      - tell
      - run
    collective_terms:
      - all
      - every
      - each
      - roster
      - they
      - both
    min_known_sessions: 2
  output:
    tag: yoagent-job-plan
    schema:
      type: object
      additionalProperties: false
      required:
        - type
        - roster
        - destination
        - command
        - return_result
      properties:
        type:
          type: string
          enum:
            - wait_roster_then_send
        roster:
          type: array
          minItems: 1
          maxItems: 32
          items:
            type: string
            format: known-session
        destination:
          type: string
          format: known-session
        command:
          type: string
          maxLength: 4000
        return_result:
          type: boolean
