name: wait-then-run
kind: workflow
description: >-
  Wait for a target session to become idle or done, then use YO!agent as the central command surface to send the user's prompt to that same resolved agent pane. Use direct execution for explicit requests; use preview only when the user asks to confirm first. Preserve perspectives by composing the target prompt from the target agent's point of view and stripping routing wrappers like "ask agent 1 to", so "ask agent 1 to <do ...>" sends only "<do ...>", "ask agent 1 to list changed files" becomes "list changed files", and "tell it what it has done" becomes "what have you done?", while quoted commands or explicit "run ..." text stay raw. Wait-then-send returns results by default: re-resolve and verify the target pane accepts a Claude/Codex prompt, reject busy/approval/stale panes, clear any detected input draft before paste, answer immediately that the prompt was sent, then background-watch the target transcript or visible pane and append the result to the YO!agent conversation. If the user says not to wait, just send it, or no output is needed, send without a watcher.
tools:
  - read_activity
  - watch_session
  - preview_send_prompt
  - execute_confirmed_send
triggers:
  - wait for session to finish then run
  - when this is done tell it to run
  - wait for session 6 then ask for date
  - wait for session 6 then ask for date and tell me the result
confirmation: none
default_timeout_minutes: 120
