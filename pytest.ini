[pytest]
markers =
    socket: tests that bind or connect to local sockets; skip with -m "not socket" in restricted sandboxes
    browser: Selenium/browser layout tests; these need Chrome/ChromeDriver and local sockets
    visual_golden: local browser screenshot comparisons; run serially because parallel Chrome rendering can vary by enough pixels to invalidate a reviewed baseline
    boot: fatal full-bundle startup smoke tests; run as their own fast-fail browser lane
    node_bridge: pytest bridge tests that spawn the standalone Node layout suite
    e2e: end-to-end tests that launch a real TmuxWebtermApp + tmux + claude.py/codex.py --mock agent; run as their own parallel lane and skipped in socket-restricted sandboxes
